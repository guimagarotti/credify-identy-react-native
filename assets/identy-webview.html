<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Identy Facial Capture</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            max-width: 400px;
            width: 100%;
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .status {
            text-align: center;
            margin-bottom: 20px;
            font-size: 18px;
            font-weight: 600;
            color: #333;
        }

        .feedback {
            text-align: center;
            margin-bottom: 20px;
            font-size: 14px;
            color: #666;
        }

        .camera-container {
            position: relative;
            width: 100%;
            height: 300px;
            border-radius: 8px;
            overflow: hidden;
            background: #000;
            margin-bottom: 20px;
        }

        #camera {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .button-primary {
            background: #007AFF;
            color: white;
        }

        .button-primary:hover {
            background: #0056CC;
        }

        .button-success {
            background: #34C759;
            color: white;
        }

        .button-success:hover {
            background: #28A745;
        }

        .button-secondary {
            background: #F2F2F7;
            color: #333;
            border: 1px solid #E5E5EA;
        }

        .button-secondary:hover {
            background: #E5E5EA;
        }

        .error {
            background: #FF3B30;
            color: white;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
        }

        .success {
            background: #34C759;
            color: white;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
        }

        .hidden {
            display: none;
        }

        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid #007AFF;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="status" class="status">Reconhecimento Facial</div>
        <div id="feedback" class="feedback">Pronto para iniciar</div>

        <div id="error" class="error hidden"></div>
        <div id="success" class="success hidden"></div>

        <div id="loading" class="loading hidden">
            <div class="spinner"></div>
            <span>Carregando...</span>
        </div>

        <div id="camera-container" class="camera-container hidden">
            <video id="camera" autoplay playsinline></video>
            <canvas id="canvas" class="hidden"></canvas>
        </div>

        <button id="start-btn" class="button button-primary">Iniciar Captura</button>
        <button id="capture-btn" class="button button-success hidden">📸 Capturar</button>
        <button id="cancel-btn" class="button button-secondary">Cancelar</button>
    </div>

    <script type="module">
        // Configurações recebidas do React Native
        let config = {};
        let sdkInstance = null;

        // Elementos DOM
        const statusEl = document.getElementById('status');
        const feedbackEl = document.getElementById('feedback');
        const errorEl = document.getElementById('error');
        const successEl = document.getElementById('success');
        const loadingEl = document.getElementById('loading');
        const cameraContainerEl = document.getElementById('camera-container');
        const cameraEl = document.getElementById('camera');
        const canvasEl = document.getElementById('canvas');
        const startBtn = document.getElementById('start-btn');
        const captureBtn = document.getElementById('capture-btn');
        const cancelBtn = document.getElementById('cancel-btn');

        // Comunicação com React Native
        function sendToReactNative(type, data = {}) {
            if (window.ReactNativeWebView) {
                window.ReactNativeWebView.postMessage(JSON.stringify({ type, ...data }));
            }
        }

        // Receber mensagens do React Native
        window.addEventListener('message', (event) => {
            try {
                const message = JSON.parse(event.data);
                handleMessage(message);
            } catch (error) {
                console.error('Erro ao processar mensagem:', error);
            }
        });

        function handleMessage(message) {
            console.log('Mensagem recebida do RN:', message);

            switch (message.type) {
                case 'INIT_CONFIG':
                    config = message.config;
                    break;
                case 'START_CAPTURE':
                    startCapture();
                    break;
                case 'STOP_CAPTURE':
                    stopCapture();
                    break;
            }
        }

        function updateUI({ status, feedback, error, success, showCamera, showLoading }) {
            statusEl.textContent = status || 'Reconhecimento Facial';
            feedbackEl.textContent = feedback || '';

            errorEl.textContent = error || '';
            errorEl.classList.toggle('hidden', !error);

            successEl.textContent = success || '';
            successEl.classList.toggle('hidden', !success);

            loadingEl.classList.toggle('hidden', !showLoading);
            cameraContainerEl.classList.toggle('hidden', !showCamera);

            startBtn.classList.toggle('hidden', showCamera || showLoading);
            captureBtn.classList.toggle('hidden', !showCamera || showLoading);
        }

        async function startCapture() {
            try {
                updateUI({
                    status: 'Inicializando...',
                    feedback: 'Carregando SDK Identy',
                    showLoading: true
                });

                // Simular carregamento do SDK (em produção, seria o import real)
                await new Promise(resolve => setTimeout(resolve, 2000));

                updateUI({
                    status: 'Aguardando permissão...',
                    feedback: 'Solicitando acesso à câmera',
                    showLoading: true
                });

                // Solicitar permissão da câmera
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'user' }
                });

                cameraEl.srcObject = stream;

                updateUI({
                    status: 'Pronto para capturar',
                    feedback: 'Posicione seu rosto na câmera',
                    showCamera: true
                });

                sendToReactNative('READY');

            } catch (error) {
                console.error('Erro ao iniciar captura:', error);
                updateUI({
                    status: 'Erro',
                    error: error.message || 'Erro ao acessar câmera',
                    showLoading: false
                });
                sendToReactNative('ERROR', { error: error.message });
            }
        }

        function stopCapture() {
            if (cameraEl.srcObject) {
                const stream = cameraEl.srcObject;
                stream.getTracks().forEach(track => track.stop());
                cameraEl.srcObject = null;
            }

            updateUI({
                status: 'Cancelado',
                feedback: 'Captura cancelada',
                showCamera: false
            });

            sendToReactNative('CANCELLED');
        }

        async function captureImage() {
            try {
                updateUI({
                    status: 'Capturando...',
                    feedback: 'Processando imagem',
                    showLoading: true,
                    showCamera: false
                });

                const canvas = canvasEl;
                const context = canvas.getContext('2d');
                canvas.width = cameraEl.videoWidth;
                canvas.height = cameraEl.videoHeight;

                context.drawImage(cameraEl, 0, 0, canvas.width, canvas.height);

                // Converter para base64
                const imageData = canvas.toDataURL('image/png');

                updateUI({
                    status: 'Sucesso!',
                    success: 'Imagem capturada com sucesso',
                    showLoading: false
                });

                sendToReactNative('CAPTURE_SUCCESS', { imageData });

            } catch (error) {
                console.error('Erro na captura:', error);
                updateUI({
                    status: 'Erro',
                    error: error.message || 'Erro na captura',
                    showLoading: false,
                    showCamera: true
                });
                sendToReactNative('ERROR', { error: error.message });
            }
        }

        // Event listeners
        startBtn.addEventListener('click', () => {
            sendToReactNative('START_REQUESTED');
        });

        captureBtn.addEventListener('click', captureImage);

        cancelBtn.addEventListener('click', () => {
            sendToReactNative('CANCEL_REQUESTED');
        });

        // Inicialização
        updateUI({
            status: 'Reconhecimento Facial',
            feedback: 'Pronto para iniciar'
        });

        sendToReactNative('WEBVIEW_READY');
    </script>
</body>
</html>
